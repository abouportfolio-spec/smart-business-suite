{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier {{ produit.nom }}</title>
    {% tailwind_css %}
    <style>
        form p label { @apply block text-xs font-bold text-slate-500 uppercase mb-1 mt-4; }
        form p input { @apply w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-blue-500 outline-none; }
    </style>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-2xl">
        <h1 class="text-2xl font-black text-blue-400 mb-6">Modifier le Produit</h1>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="grid grid-cols-2 gap-4 mt-8">
                <a href="{% url 'dashboard' %}" class="text-center py-3 px-4 rounded-xl border border-slate-600 text-slate-400 hover:bg-slate-700 transition-all">
                    Annuler
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</body>
</html>
